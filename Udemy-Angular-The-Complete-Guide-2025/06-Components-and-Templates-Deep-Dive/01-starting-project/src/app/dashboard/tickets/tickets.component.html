<div id="new-ticket">
  <app-new-ticket (add)="onAddTicket($event)"></app-new-ticket>
</div>

<div id="tickets">
  <ul>
    @for (ticket of tickets; track ticket.id) {
      <li>
        <app-ticket
          (close)="onCloseTicket(ticket.id)"
          [ticket]="ticket"
        ></app-ticket>
      </li>
    } @empty {
      <p>No tickets found.</p>
    }
  </ul>
</div>
