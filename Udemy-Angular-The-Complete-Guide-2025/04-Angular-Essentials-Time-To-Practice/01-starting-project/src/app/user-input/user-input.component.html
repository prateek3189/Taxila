<form (submit)="onSubmit()">
  <div class="input-group">
    <p>
      <label for="initial-investment">Initial Investment ($)</label>
      <input
        type="number"
        id="initial-investment"
        name="initialInvestment"
        [(ngModel)]="initialInvestment"
      />
    </p>
    <p>
      <label for="annual-contribution">Annual Contribution ($)</label>
      <input
        type="number"
        id="annual-contribution"
        name="annualContribution"
        [(ngModel)]="annualContribution"
      />
    </p>
  </div>
  <div class="input-group">
    <p>
      <label for="expected-return">Expected Return (%)</label>
      <input
        type="number"
        id="expected-return"
        name="expectedReturn"
        [(ngModel)]="expectedReturn"
      />
    </p>
    <p>
      <label for="investment-duration">Investment Duration (years)</label>
      <input
        type="number"
        id="investment-duration"
        name="investmentDuration"
        [(ngModel)]="investmentDuration"
      />
    </p>
  </div>
  <p>
    <button type="submit">Calculate</button>
  </p>
</form>
