<section id="tasks">
  <header>
    <h2>{{ user.name }}'s Tasks</h2>
    <menu>
      <button (click)="onAddTaskClick()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of userTasks; track task.id) {
      <li>
        <app-task [task]="task" (complete)="onTaskComplete($event)"></app-task>
      </li>
    }
  </ul>
</section>

@if (isAddingTask) {
  <app-add-task (close)="onCloseAddTask()" [userId]="userId"></app-add-task>
}
